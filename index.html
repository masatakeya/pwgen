<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pwgen — Password Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --border: #e2e5eb;
    --accent: #2563eb;
    --accent-light: #eff4ff;
    --accent-hover: #1d4ed8;
    --success: #059669;
    --success-light: #ecfdf5;
    --text: #111827;
    --text-2: #4b5563;
    --text-3: #9ca3af;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  .container {
    width: 100%;
    max-width: 560px;
  }

  header {
    margin-bottom: 36px;
    text-align: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 5px 14px;
    border-radius: 999px;
    margin-bottom: 16px;
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-family: var(--sans);
    font-size: clamp(28px, 6vw, 40px);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-2);
    line-height: 1.6;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px;
    margin-bottom: 16px;
  }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 16px;
  }

  .slider-group {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 28px;
  }

  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .slider-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .slider-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .slider-val {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    background: var(--surface);
    border: 3px solid var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(37,99,235,0.25);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
    box-shadow: 0 4px 16px rgba(37,99,235,0.35);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 -28px 24px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }

  .option:hover {
    border-color: #93c5fd;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.07);
  }

  .option.checked {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .check-icon {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    background: var(--surface);
  }

  .option.checked .check-icon {
    border-color: var(--accent);
    background: var(--accent);
  }

  .check-icon svg { display: none; }
  .option.checked .check-icon svg { display: block; }

  .option-info { flex: 1; min-width: 0; }

  .option-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .option-sample {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-3);
    margin-top: 2px;
  }

  .generate-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(37,99,235,0.30);
  }

  .generate-btn:hover {
    background: var(--accent-hover);
    box-shadow: 0 6px 20px rgba(37,99,235,0.38);
  }

  .generate-btn:active { transform: scale(0.99); }

  .results-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }

  .results-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
  }

  .copy-all-btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-light);
    border: none;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .copy-all-btn:hover { background: #dbeafe; }

  .results-list {
    max-height: 380px;
    overflow-y: auto;
  }

  .results-list::-webkit-scrollbar { width: 4px; }
  .results-list::-webkit-scrollbar-track { background: transparent; }
  .results-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .pw-row {
    display: flex;
    align-items: center;
    padding: 12px 24px;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .pw-row:last-child { border-bottom: none; }
  .pw-row:hover { background: #fafbff; }

  .pw-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-3);
    width: 18px;
    flex-shrink: 0;
    text-align: right;
  }

  .pw-text {
    flex: 1;
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0.06em;
    color: var(--text);
    word-break: break-all;
  }

  .c-upper { color: #2563eb; }
  .c-lower { color: #111827; }
  .c-digit { color: #d97706; }
  .c-symbol { color: #dc2626; }

  .pw-copy-btn {
    flex-shrink: 0;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-3);
    background: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, border-color 0.15s, background 0.15s;
  }

  .pw-row:hover .pw-copy-btn { opacity: 1; }

  .pw-row.copied .pw-copy-btn {
    opacity: 1;
    color: var(--success);
    border-color: var(--success);
    background: var(--success-light);
  }

  .entropy-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    background: #fafbff;
  }

  .entropy-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-3);
    white-space: nowrap;
  }

  .entropy-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  .entropy-fill {
    height: 100%;
    border-radius: 999px;
    width: 0%;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.4s;
  }

  .entropy-text {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    min-width: 100px;
    text-align: right;
  }

  .empty-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--text-3);
    font-size: 14px;
    line-height: 1.6;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--text);
    color: #fff;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 999px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
    box-shadow: var(--shadow-lg);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 480px) {
    .card { padding: 20px; }
    .divider { margin: 0 -20px 20px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="badge">
      <span class="badge-dot"></span>
      ブラウザ完結・サーバー送信なし
    </div>
    <h1>パスワード生成ツール</h1>
    <p class="subtitle">安全な乱数を使って、強力なパスワードをすばやく作れます。</p>
  </header>

  <div class="card">
    <div class="section-label">設定</div>

    <div class="slider-group">
      <div class="slider-row">
        <div class="slider-top">
          <span class="slider-name">パスワードの長さ</span>
          <span class="slider-val" id="lengthValue">16</span>
        </div>
        <input type="range" id="lengthSlider" min="4" max="64" value="16">
      </div>
      <div class="slider-row">
        <div class="slider-top">
          <span class="slider-name">生成する件数</span>
          <span class="slider-val" id="countValue">8</span>
        </div>
        <input type="range" id="countSlider" min="1" max="20" value="8">
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-label">使用する文字の種類</div>
    <div class="options-grid">
      <label class="option checked" id="opt-upper">
        <div class="check-icon">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="option-info">
          <div class="option-name">大文字</div>
          <div class="option-sample">A B C … Z</div>
        </div>
        <input type="checkbox" checked style="display:none" data-key="upper">
      </label>
      <label class="option checked" id="opt-lower">
        <div class="check-icon">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="option-info">
          <div class="option-name">小文字</div>
          <div class="option-sample">a b c … z</div>
        </div>
        <input type="checkbox" checked style="display:none" data-key="lower">
      </label>
      <label class="option checked" id="opt-digit">
        <div class="check-icon">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="option-info">
          <div class="option-name">数字</div>
          <div class="option-sample">0 1 2 … 9</div>
        </div>
        <input type="checkbox" checked style="display:none" data-key="digit">
      </label>
      <label class="option" id="opt-symbol">
        <div class="check-icon">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="option-info">
          <div class="option-name">記号</div>
          <div class="option-sample">! @ # $ % …</div>
        </div>
        <input type="checkbox" style="display:none" data-key="symbol">
      </label>
    </div>

    <button class="generate-btn" id="generateBtn">パスワードを生成する</button>
  </div>

  <div class="results-card">
    <div class="results-header">
      <span class="results-title">生成結果</span>
      <button class="copy-all-btn" id="copyAllBtn">すべてコピー</button>
    </div>
    <div class="results-list" id="resultsList">
      <div class="empty-state">上のボタンを押すと、<br>ここにパスワードが表示されます。</div>
    </div>
    <div class="entropy-row" id="entropyRow" style="display:none">
      <span class="entropy-label">強度</span>
      <div class="entropy-bar"><div class="entropy-fill" id="entropyFill"></div></div>
      <span class="entropy-text" id="entropyText"></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const CHARS = {
    upper:  'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower:  'abcdefghijklmnopqrstuvwxyz',
    digit:  '0123456789',
    symbol: '!@#$%^&*()-_=+[]{}|;:,.<>?'
  };

  const lengthSlider = document.getElementById('lengthSlider');
  const lengthValue  = document.getElementById('lengthValue');
  const countSlider  = document.getElementById('countSlider');
  const countValue   = document.getElementById('countValue');
  const generateBtn  = document.getElementById('generateBtn');
  const resultsList  = document.getElementById('resultsList');
  const copyAllBtn   = document.getElementById('copyAllBtn');
  const entropyRow   = document.getElementById('entropyRow');
  const entropyFill  = document.getElementById('entropyFill');
  const entropyText  = document.getElementById('entropyText');
  const toast        = document.getElementById('toast');

  lengthSlider.addEventListener('input', () => lengthValue.textContent = lengthSlider.value);
  countSlider.addEventListener('input',  () => countValue.textContent  = countSlider.value);

  document.querySelectorAll('.option').forEach(opt => {
    opt.addEventListener('click', () => {
      const active = document.querySelectorAll('.option.checked').length;
      if (opt.classList.contains('checked') && active <= 1) return;
      opt.classList.toggle('checked');
      opt.querySelector('input[type=checkbox]').checked = opt.classList.contains('checked');
    });
  });

  function generatePassword(length, opts) {
    let pool = '';
    if (opts.upper)  pool += CHARS.upper;
    if (opts.lower)  pool += CHARS.lower;
    if (opts.digit)  pool += CHARS.digit;
    if (opts.symbol) pool += CHARS.symbol;
    if (!pool) pool = CHARS.lower;

    const arr = new Uint32Array(length);
    crypto.getRandomValues(arr);
    let pwArr = Array.from(arr).map(n => pool[n % pool.length]);

    const required = [];
    if (opts.upper)  required.push(CHARS.upper);
    if (opts.lower)  required.push(CHARS.lower);
    if (opts.digit)  required.push(CHARS.digit);
    if (opts.symbol) required.push(CHARS.symbol);

    if (required.length > 1 && length >= required.length) {
      const positions = [...Array(length).keys()];
      for (let i = positions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [positions[i], positions[j]] = [positions[j], positions[i]];
      }
      required.forEach((charset, idx) => {
        const rnd = new Uint32Array(1);
        crypto.getRandomValues(rnd);
        pwArr[positions[idx]] = charset[rnd[0] % charset.length];
      });
    }
    return pwArr.join('');
  }

  function charClass(ch) {
    if (/[A-Z]/.test(ch)) return 'c-upper';
    if (/[a-z]/.test(ch)) return 'c-lower';
    if (/[0-9]/.test(ch)) return 'c-digit';
    return 'c-symbol';
  }

  function colorize(pw) {
    return pw.split('').map(ch =>
      `<span class="${charClass(ch)}">${ch}</span>`
    ).join('');
  }

  function calcEntropy(length, opts) {
    let size = 0;
    if (opts.upper)  size += 26;
    if (opts.lower)  size += 26;
    if (opts.digit)  size += 10;
    if (opts.symbol) size += CHARS.symbol.length;
    return Math.floor(length * Math.log2(size));
  }

  function updateEntropy(bits) {
    entropyRow.style.display = 'flex';
    const pct = Math.min(100, Math.round(bits / 128 * 100));
    let label, color;
    if (bits < 40)      { label = '弱い';       color = '#ef4444'; }
    else if (bits < 64) { label = '普通';       color = '#f59e0b'; }
    else if (bits < 96) { label = '強い';       color = '#10b981'; }
    else                { label = '非常に強い'; color = '#2563eb'; }
    entropyFill.style.width = pct + '%';
    entropyFill.style.background = color;
    entropyText.style.color = color;
    entropyText.textContent = `${bits} bit · ${label}`;
  }

  let passwords = [];

  function generate() {
    const length = parseInt(lengthSlider.value);
    const count  = parseInt(countSlider.value);
    const opts = {
      upper:  document.querySelector('[data-key="upper"]').checked,
      lower:  document.querySelector('[data-key="lower"]').checked,
      digit:  document.querySelector('[data-key="digit"]').checked,
      symbol: document.querySelector('[data-key="symbol"]').checked,
    };

    passwords = Array.from({ length: count }, () => generatePassword(length, opts));

    resultsList.innerHTML = passwords.map((pw, i) => `
      <div class="pw-row" data-pw="${pw.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}">
        <span class="pw-num">${i + 1}</span>
        <span class="pw-text">${colorize(pw)}</span>
        <button class="pw-copy-btn" onclick="copyRow(this.closest('.pw-row'))">コピー</button>
      </div>
    `).join('');

    updateEntropy(calcEntropy(length, opts));
  }

  function copyRow(el) {
    const pw = el.dataset.pw;
    navigator.clipboard.writeText(pw).then(() => {
      document.querySelectorAll('.pw-row').forEach(r => {
        r.classList.remove('copied');
        const btn = r.querySelector('.pw-copy-btn');
        if (btn) btn.textContent = 'コピー';
      });
      el.classList.add('copied');
      el.querySelector('.pw-copy-btn').textContent = '✓ 完了';
      setTimeout(() => {
        el.classList.remove('copied');
        const btn = el.querySelector('.pw-copy-btn');
        if (btn) btn.textContent = 'コピー';
      }, 2000);
    });
  }

  copyAllBtn.addEventListener('click', () => {
    if (!passwords.length) return;
    navigator.clipboard.writeText(passwords.join('\n')).then(() => {
      showToast('すべてのパスワードをコピーしました');
    });
  });

  generateBtn.addEventListener('click', generate);

  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
  }

  generate();
</script>
</body>
</html>
